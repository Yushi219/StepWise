<!-- @dsCard group="Components" viewport="700x150" name="Buttons" subtitle="Primary · strong · ghost · warn — actions in the tool" -->
<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8">
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Hanken+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../styles.css">
<style>body{margin:0;background:var(--bg-canvas);color:var(--text-on-dark-hi);font-family:var(--font-sans);padding:22px}
.btn{appearance:none;cursor:pointer;border-radius:var(--r-sm);font-family:var(--font-sans);font-weight:600;font-size:13.5px;padding:10px 16px;display:inline-flex;align-items:center;gap:7px;line-height:1;border:1px solid transparent}
.lbl{font-family:var(--font-mono);font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:var(--text-on-dark-lo);margin:0 0 14px}</style></head><body><p class="lbl">Button variants</p>
<div style="display:flex;gap:10px;flex-wrap:wrap;align-items:center">
<button class="btn" style="background:var(--accent);color:#fff;border-color:var(--accent)">Apply</button>
<button class="btn" style="background:var(--accent-strong);color:#fff;border-color:var(--accent-strong)">Apply &amp; create exception</button>
<button class="btn" style="background:rgba(255,255,255,.06);color:var(--text-on-dark-hi);border-color:var(--line-on-dark-2)">Preview impact</button>
<button class="btn" style="background:transparent;color:var(--text-on-dark-mid);border-color:var(--line-on-dark-2)">Cancel</button>
<button class="btn" style="background:var(--warn-500);color:#fff;border-color:var(--warn-500)">Detach type</button>
</div></body></html>
