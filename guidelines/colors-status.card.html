<!-- @dsCard group="Colors" viewport="700x150" name="Status palette" subtitle="Functional semantics — exception, warning, ok, external" -->
<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8">
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Hanken+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../styles.css">
<style>body{margin:0;background:var(--bg-canvas);color:var(--text-on-dark-hi);font-family:var(--font-sans);padding:22px}
.swrow{display:flex;gap:8px}.sw{flex:1;height:84px;border-radius:8px;display:flex;flex-direction:column;justify-content:flex-end;padding:9px;font-family:var(--font-mono);font-size:10px;line-height:1.3}
.sw .n{opacity:.7}.lbl{font-family:var(--font-mono);font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:var(--text-on-dark-lo);margin:0 0 12px}</style></head><body><div class="swrow">
<div class="sw" style="background:var(--exception-500);color:#fff"><span class="n">#F5841F</span><span>exception</span></div><div class="sw" style="background:var(--warn-500);color:#fff"><span class="n">#F24438</span><span>warn</span></div><div class="sw" style="background:var(--ok-500);color:#fff"><span class="n">#1EAE6E</span><span>ok</span></div><div class="sw" style="background:var(--external-500);color:#fff"><span class="n">#F76FB0</span><span>external</span></div><div class="sw" style="background:var(--accent);color:#fff"><span class="n">#3D7DFF</span><span>typical</span></div>
</div></body></html>
