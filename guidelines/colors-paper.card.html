<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8">
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Hanken+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../styles.css">
<style>body{margin:0;background:var(--bg-canvas);color:var(--text-on-dark-hi);font-family:var(--font-sans);padding:22px}
.swrow{display:flex;gap:8px}.sw{flex:1;height:84px;border-radius:8px;display:flex;flex-direction:column;justify-content:flex-end;padding:9px;font-family:var(--font-mono);font-size:10px;line-height:1.3}
.sw .n{opacity:.7}.lbl{font-family:var(--font-mono);font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:var(--text-on-dark-lo);margin:0 0 12px}</style></head><body><div class="swrow">
<div class="sw" style="background:var(--paper-0);color:#11151C"><span class="n">#FFFFFF</span><span>0</span></div><div class="sw" style="background:var(--paper-50);color:#11151C"><span class="n">#F7F8FA</span><span>50</span></div><div class="sw" style="background:var(--paper-100);color:#11151C"><span class="n">#F0F2F5</span><span>100</span></div><div class="sw" style="background:var(--paper-200);color:#11151C"><span class="n">#E5E8EE</span><span>200</span></div><div class="sw" style="background:var(--paper-300);color:#11151C"><span class="n">#D6DBE3</span><span>300</span></div><div class="sw" style="background:var(--paper-400);color:#11151C"><span class="n">#B8C0CC</span><span>400</span></div>
</div></body></html>
