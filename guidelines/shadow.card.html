<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8">
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Hanken+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../styles.css">
<style>body{margin:0;background:var(--bg-canvas);color:var(--text-on-dark-hi);font-family:var(--font-sans);padding:22px}
.swrow{display:flex;gap:8px}.sw{flex:1;height:84px;border-radius:8px;display:flex;flex-direction:column;justify-content:flex-end;padding:9px;font-family:var(--font-mono);font-size:10px;line-height:1.3}
.sw .n{opacity:.7}.lbl{font-family:var(--font-mono);font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:var(--text-on-dark-lo);margin:0 0 12px}</style></head><body><div style="display:flex;gap:20px;padding:6px 0">
<div style="text-align:center"><div style="width:96px;height:64px;background:var(--paper-0);border-radius:10px;box-shadow:var(--shadow-sm)"></div><div style="font-family:var(--font-mono);font-size:10px;color:var(--text-on-dark-lo);margin-top:10px">--shadow-sm</div></div><div style="text-align:center"><div style="width:96px;height:64px;background:var(--paper-0);border-radius:10px;box-shadow:var(--shadow-md)"></div><div style="font-family:var(--font-mono);font-size:10px;color:var(--text-on-dark-lo);margin-top:10px">--shadow-md</div></div><div style="text-align:center"><div style="width:96px;height:64px;background:var(--paper-0);border-radius:10px;box-shadow:var(--shadow-lg)"></div><div style="font-family:var(--font-mono);font-size:10px;color:var(--text-on-dark-lo);margin-top:10px">--shadow-lg</div></div><div style="text-align:center"><div style="width:96px;height:64px;background:var(--paper-0);border-radius:10px;box-shadow:var(--shadow-panel)"></div><div style="font-family:var(--font-mono);font-size:10px;color:var(--text-on-dark-lo);margin-top:10px">--shadow-panel</div></div>
</div></body></html>
